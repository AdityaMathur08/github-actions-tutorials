name: Building Blocks Workflow
on: push

jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello, World!"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Intentional Failure
        run: |
            echo "This step is designed to fail."
            exit 1
      - name: Say Goodbye
        run: echo "Goodbye, World!"